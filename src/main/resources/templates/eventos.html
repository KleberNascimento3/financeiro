<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Eventos Financeiros</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>

<!-- HEADER -->

<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between mb-3">

        <h2>Eventos Financeiros</h2>

        <a th:href="@{/eventos/novo}"
           class="btn btn-primary">
            Novo Evento
        </a>

    </div>

    <table class="table table-striped table-hover">

        <thead class="table-dark">

            <tr>
                <th>Índice</th>
                <th>Descrição</th>
                <th>Data</th>
                <th>Tipo</th>
                <th>Encerrado</th> 
                 <th>Ações</th>               
            </tr>

        </thead>

        <tbody>

            <tr th:each="evento : ${lista}">

    <td th:text="${evento.indice}"></td>

    <td th:text="${evento.descricao}"></td>

    <td th:text="${evento.dataEvento}"></td>

    <td th:text="${evento.tipo}"></td>

    <td th:text="${evento.encerrado == true ? 'Sim' : 'Não'}"></td>

    <td>

        <a th:href="@{/eventos/{id}(id=${evento.id})}"
           class="btn btn-info btn-sm">
           Detalhes
        </a>

        <a th:href="@{/eventos/editar/{id}(id=${evento.id})}"
           class="btn btn-warning btn-sm">
           Editar
        </a>

        <a th:if="${evento.encerrado == false}"
           th:href="@{/eventos/encerrar/{id}(id=${evento.id})}"
           class="btn btn-danger btn-sm">
           Encerrar
        </a>

    </td>

</tr>

        </tbody>

    </table>

</div>
<!-- FOOTER -->

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
