<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Novo Evento</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3>Novo Evento Financeiro</h3>
        </div>

        <div class="card-body">

            <form th:action="@{/eventos/salvar}"
                  th:object="${evento}"
                  method="post">

                <div class="mb-3">
                    <label class="form-label">Índice</label>

                    <input type="number"
                           class="form-control"
                           th:field="*{indice}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Descrição</label>

                    <input type="text"
                           class="form-control"
                           th:field="*{descricao}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Data do Evento</label>

                    <input type="date"
                           class="form-control"
                           th:field="*{dataEvento}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Tipo</label>

                    <select class="form-select"
                            th:field="*{tipo}">

                        <option value="">Selecione</option>

                        <option value="VALE">
                            Vale
                        </option>

                        <option value="PAGAMENTO">
                            Pagamento
                        </option>

                    </select>
                </div>

                <div class="form-check mb-3">

                    <input class="form-check-input"
                           type="checkbox"
                           th:field="*{encerrado}">

                    <label class="form-check-label">
                        Evento Encerrado
                    </label>

                </div>

                <button type="submit"
                        class="btn btn-success">
                    Salvar
                </button>

                <a th:href="@{/eventos}"
                   class="btn btn-secondary">
                    Voltar
                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
