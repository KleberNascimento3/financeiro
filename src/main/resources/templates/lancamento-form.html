<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Novo Lançamento</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background-color:#f5f7fa;
}

.card{
    border:none;
    border-radius:15px;
}

.card-header{
    border-radius:15px 15px 0 0 !important;
}

</style>

</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">Novo Lançamento</h3>
        </div>

        <div class="card-body">

            <form th:action="@{/lancamentos/salvar}"
                  th:object="${lancamento}"
                  method="post">

                <input type="hidden" th:field="*{id}">
                <input type="hidden" name="filtroEventoId" th:value="${filtroEventoId}">
                <input type="hidden" name="filtroCartaoId" th:value="${filtroCartaoId}">
                <input type="hidden" name="filtroDescricao" th:value="${filtroDescricao}">
                <input type="hidden" name="filtroInicio" th:value="${filtroInicio}">
                <input type="hidden" name="filtroFim" th:value="${filtroFim}">

                <div class="row">

                    <!-- DESCRIÇÃO -->
                    <div class="col-md-8 mb-3">
                        <label class="form-label">Descrição</label>

                        <input type="text"
                               class="form-control"
                               th:field="*{descricao}">

                        <div class="text-danger"
                             th:if="${#fields.hasErrors('descricao')}"
                             th:errors="*{descricao}">
                        </div>
                    </div>

                    <!-- VALOR -->
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Valor</label>

                        <input type="number"
                               step="0.01"
                               class="form-control"
                               th:field="*{valor}">

                        <div class="text-danger"
                             th:if="${#fields.hasErrors('valor')}"
                             th:errors="*{valor}">
                        </div>
                    </div>

                    <!-- CATEGORIA -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Categoria</label>

                        <select class="form-select"
                                th:field="*{categoria.id}">

                            <option value="">
                                Selecione...
                            </option>

                            <option th:each="cat : ${categorias}"
                                    th:value="${cat.id}"
                                    th:text="${cat.nome}">
                            </option>

                        </select>

                        <div class="text-danger"
                             th:if="${#fields.hasErrors('categoria')}"
                             th:errors="*{categoria}">
                        </div>
                    </div>

                    <!-- CARTÃO -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Cartão</label>

                        <select class="form-select"
                                th:field="*{cartao.id}">

                            <option value="">
                                Sem cartão
                            </option>

                            <option th:each="cartao : ${cartoes}"
                                    th:value="${cartao.id}"
                                    th:text="${cartao.nome}">
                            </option>

                        </select>
                    </div>

						<!-- DATA -->
						<div class="col-md-6 mb-3">
							<label class="form-label"> Data de Vencimento </label> <input
								type="date" class="form-control" id="dataVencimento"
								name="dataVencimento"
								th:value="${#temporals.format(lancamento.dataVencimento, 'yyyy-MM-dd')}">

							<div class="text-danger"
								th:if="${#fields.hasErrors('dataVencimento')}"
								th:errors="*{dataVencimento}"></div>
						</div>

						<!-- TIPO -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            Tipo
                        </label>

                        <select class="form-select"
                                th:field="*{tipo}">
                            <option value="RECEITA">
                                Receita
                            </option>
                            <option value="DESPESA">
                                Despesa
                            </option>
                        </select>

                        <div class="text-danger"
                             th:if="${#fields.hasErrors('tipo')}"
                             th:errors="*{tipo}">
                        </div>
                    </div>

                    <!-- STATUS -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            Status
                        </label>

                        <select class="form-select"
                                th:field="*{status}">
                            <option value="PENDENTE">
                                Pendente
                            </option>
                            <option value="PAGO">
                                Pago
                            </option>
                            <option value="ADIADO">
                                Adiado
                            </option>
                        </select>

                        <div class="text-danger"
                             th:if="${#fields.hasErrors('status')}"
                             th:errors="*{status}">
                        </div>
                    </div>

                    <!-- RECORRENTE -->
                    <div class="col-md-3 mb-3">
                        <label class="form-label">
                            Recorrente
                        </label>

                        <select class="form-select"
                                th:field="*{recorrente}">
                            <option th:value="false">
                                Não
                            </option>
                            <option th:value="true">
                                Sim
                            </option>
                        </select>
                    </div>

						<div class="col-md-3 mb-3">
							<label class="form-label">Dia Recorrência</label> <select
								class="form-select" th:field="*{diaRecorrencia}">
								<option value="">Não se aplica</option>
								<option value="15">Dia 15</option>
								<option value="30">Dia 30</option>
							</select>
						</div>

						<!-- PARCELADO -->
                    <div class="col-md-3 mb-3">
                        <label class="form-label">
                            Parcelado
                        </label>

                        <select class="form-select"
                                th:field="*{parcelado}">
                            <option th:value="false">
                                Não
                            </option>
                            <option th:value="true">
                                Sim
                            </option>
                        </select>
                    </div>

                    <!-- TOTAL DE PARCELAS -->
                    <div class="col-md-3 mb-3">
                        <label class="form-label">
                            Nº Parcelas
                        </label>

                        <input type="number"
                               min="1"
                               class="form-control"
                               th:field="*{totalParcelas}">
                    </div>

						<!-- EVENTO -->
						<div class="col-md-12 mb-3">
							<label class="form-label"> Evento Financeiro </label> <select
								class="form-select" id="evento" name="evento.id">

								<option value="">Selecione...</option>

								<option th:each="evento : ${eventos}" th:value="${evento.id}"
									th:selected="${lancamento.evento != null 
                              and lancamento.evento.id != null 
                              and lancamento.evento.id == evento.id}"
									th:text="${evento.indice + ' - ' + evento.tipo + ' - ' + evento.descricao}">
								</option>

							</select>

							<div class="text-danger" th:if="${#fields.hasErrors('evento')}"
								th:errors="*{evento}"></div>
						</div>
					</div>

                <hr>

                <div class="d-flex gap-2">

                    <button type="submit"
                            class="btn btn-success">
                        Salvar
                    </button>

                    <a th:href="@{/lancamentos(eventoId=${filtroEventoId}, cartaoId=${filtroCartaoId}, descricao=${filtroDescricao}, inicio=${filtroInicio}, fim=${filtroFim})}"
                       class="btn btn-secondary">
                        Voltar
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
