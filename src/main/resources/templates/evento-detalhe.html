<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Detalhes do Evento</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
    
    <div class="row mb-4">

    <div class="col-md-4">

        <div class="card border-success">

            <div class="card-body">

                <h6>Receitas</h6>

                <h3 class="text-success"
                    th:text="${receitas}">
                </h3>

            </div>

        </div>

    </div>

    <div class="col-md-4">

        <div class="card border-danger">

            <div class="card-body">

                <h6>Despesas</h6>

                <h3 class="text-danger"
                    th:text="${despesas}">
                </h3>

            </div>

        </div>

    </div>

    <div class="col-md-4">

        <div class="card border-primary">

            <div class="card-body">

                <h6>Saldo Previsto</h6>

                <h3 class="text-primary"
                    th:text="${saldo}">
                </h3>

            </div>

        </div>

    </div>

</div>

        <div>
            <h2 th:text="${evento.descricao}"></h2>

            <p class="text-muted mb-0">
                Data:
                <span th:text="${evento.dataEvento}"></span>
            </p>
        </div>

			<div>
				<a th:href="@{/eventos/gerar-recorrentes/{id}(id=${evento.id})}"
					class="btn btn-primary"
					onclick="return confirm('Gerar lançamentos recorrentes neste evento?')">
					Gerar Recorrentes </a> <a th:href="@{/eventos}"
					class="btn btn-secondary"> Voltar </a>
			</div>

			<div class="card">

        <div class="card-header bg-primary text-white">

            Lançamentos do Evento

        </div>

        <div class="card-body">

            <table class="table table-striped">

                <thead>

                    <tr>
                        <th>Descrição</th>
                        <th>Tipo</th>
                        <th>Valor</th>
                        <th>Status</th>
                        <th>Vencimento</th>
                    </tr>

                </thead>

                <tbody>

                    <tr th:each="lancamento : ${lancamentos}">

                        <td th:text="${lancamento.descricao}"></td>

                        <td th:text="${lancamento.tipo}"></td>

                        <td th:text="${#numbers.formatDecimal(lancamento.valor,1,'POINT',2,'COMMA')}"></td>

                        <td th:text="${lancamento.status}"></td>

                        <td th:text="${lancamento.dataVencimento}"></td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
