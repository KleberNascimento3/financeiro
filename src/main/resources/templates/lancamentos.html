<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">

<title>Lançamentos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">

    <h2>Lançamentos Financeiros</h2>

    <a href="/lancamentos/novo"
       class="btn btn-primary mb-3">
        Novo Lançamento
    </a>

    <form method="get"
          th:action="@{/lancamentos}"
          class="row g-2 mb-3">

        <div class="col-md-3">
            <label class="form-label">Data inicial</label>
            <input type="date"
                   name="inicio"
                   class="form-control"
                   th:value="${inicioSelecionado}">
        </div>

        <div class="col-md-3">
            <label class="form-label">Data final</label>
            <input type="date"
                   name="fim"
                   class="form-control"
                   th:value="${fimSelecionado}">
        </div>

        <div class="col-md-3">
            <label class="form-label">Evento</label>
            <select name="eventoId"
                    class="form-select">

                <option value="">Todos os eventos</option>

                <option th:each="evento : ${eventos}"
                        th:value="${evento.id}"
                        th:selected="${eventoSelecionado != null and eventoSelecionado == evento.id}"
                        th:text="${evento.indice + ' - ' + evento.tipo + ' - ' + evento.descricao}">
                </option>

            </select>
        </div>

        <div class="col-md-3">
            <label class="form-label">Cartão</label>
            <select name="cartaoId"
                    class="form-select">

                <option value="">Todos os cartões</option>

                <option th:each="cartao : ${cartoes}"
                        th:value="${cartao.id}"
                        th:selected="${cartaoSelecionado != null and cartaoSelecionado == cartao.id}"
                        th:text="${cartao.nome}">
                </option>

            </select>
        </div>

        <div class="col-md-4">
            <label class="form-label">Descrição</label>
            <input type="text"
                   name="descricao"
                   class="form-control"
                   placeholder="Parte da descrição"
                   th:value="${descricaoSelecionada}">
        </div>

        <div class="col-md-2 d-flex align-items-end">
            <button class="btn btn-primary w-100"
                    type="submit">
                Filtrar
            </button>
        </div>

    </form>

    <div class="d-flex gap-2 mb-3 align-items-center flex-wrap">
        <a th:href="@{/lancamentos}"
           class="btn btn-secondary">
            Limpar Filtro
        </a>

        <button type="submit"
                form="bulk-delete-form"
                class="btn btn-danger"
                onclick="return confirm('Deseja excluir os lançamentos selecionados?')">
            Excluir selecionados
        </button>

        <div class="border rounded px-3 py-2 bg-light">
            <span class="text-muted">Selecionados:</span>
            <strong id="selected-count">0</strong>
            <span class="text-muted ms-3">Total:</span>
            <strong id="selected-total-value">R$ 0,00</strong>
        </div>
    </div>

    <form id="bulk-delete-form"
          th:action="@{/lancamentos/excluir-selecionados}"
          method="post">
        <input type="hidden" name="filtroEventoId" th:value="${eventoSelecionado}">
        <input type="hidden" name="filtroCartaoId" th:value="${cartaoSelecionado}">
        <input type="hidden" name="filtroDescricao" th:value="${descricaoSelecionada}">
        <input type="hidden" name="filtroInicio" th:value="${inicioSelecionado}">
        <input type="hidden" name="filtroFim" th:value="${fimSelecionado}">
    </form>

    <table class="table table-striped table-hover">

        <thead>
            <tr>
                <th>Sel.</th>
                <th>ID</th>
                <th>Descrição</th>
                <th>Categoria</th>
                <th>Cartão</th>
                <th>Vencimento</th>
                <th>Valor</th>
                <th>Tipo</th>
                <th>Status</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody>

            <tr th:each="item : ${lista}">

                <td>
                    <input type="checkbox"
                           name="ids"
                           th:value="${item.id}"
                           th:attr="data-valor=${item.valor}"
                           form="bulk-delete-form">
                </td>

                <td th:text="${item.id}"></td>

                <td th:text="${item.descricao}"></td>

                <td th:text="${item.categoria != null ? item.categoria.nome : ''}"></td>

                <td th:text="${item.cartao != null ? item.cartao.nome : ''}"></td>

                <td th:text="${item.dataVencimento != null ? #temporals.format(item.dataVencimento, 'dd/MM/yyyy') : ''}"></td>

                <td th:text="${#numbers.formatDecimal(item.valor,1,'POINT',2,'COMMA')}"></td>

                <td th:text="${item.tipo}"></td>

                <td th:text="${item.status}"></td>

                <td>

                    <a th:href="@{/lancamentos/editar/{id}(id=${item.id},
                            filtroEventoId=${eventoSelecionado},
                            filtroCartaoId=${cartaoSelecionado},
                            filtroDescricao=${descricaoSelecionada},
                            filtroInicio=${inicioSelecionado},
                            filtroFim=${fimSelecionado})}"
                       class="btn btn-warning btn-sm">
                        Editar
                    </a>

                    <a th:href="@{/lancamentos/duplicar/{id}(id=${item.id},
                            filtroEventoId=${eventoSelecionado},
                            filtroCartaoId=${cartaoSelecionado},
                            filtroDescricao=${descricaoSelecionada},
                            filtroInicio=${inicioSelecionado},
                            filtroFim=${fimSelecionado})}"
                       class="btn btn-info btn-sm"
                       onclick="return confirm('Deseja duplicar este lançamento?')">
                        Duplicar
                    </a>

                    <form th:action="@{/lancamentos/excluir/{id}(id=${item.id})}"
                          method="post"
                          style="display:inline">

                        <input type="hidden" name="filtroEventoId" th:value="${eventoSelecionado}">
                        <input type="hidden" name="filtroCartaoId" th:value="${cartaoSelecionado}">
                        <input type="hidden" name="filtroDescricao" th:value="${descricaoSelecionada}">
                        <input type="hidden" name="filtroInicio" th:value="${inicioSelecionado}">
                        <input type="hidden" name="filtroFim" th:value="${fimSelecionado}">

                        <button type="submit"
                                class="btn btn-danger btn-sm"
                                onclick="return confirm('Deseja realmente excluir este lançamento?')">
                            Excluir
                        </button>

                    </form>

                </td>

            </tr>

        </tbody>

    </table>

</div>

<div class="row mt-4">

    <div class="col-md-4">
        <div class="card border-success">
            <div class="card-body text-center">
                <h5 class="text-success">Receitas</h5>
                <h4 th:text="'R$ ' + ${#numbers.formatDecimal(totalReceitas,1,'POINT',2,'COMMA')}">
                    R$ 0,00
                </h4>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card border-danger">
            <div class="card-body text-center">
                <h5 class="text-danger">Despesas</h5>
                <h4 th:text="'R$ ' + ${#numbers.formatDecimal(totalDespesas,1,'POINT',2,'COMMA')}">
                    R$ 0,00
                </h4>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card border-primary">
            <div class="card-body text-center">
                <h5 class="text-primary">Saldo</h5>
                <h4 th:text="'R$ ' + ${#numbers.formatDecimal(saldoFiltro,1,'POINT',2,'COMMA')}">
                    R$ 0,00
                </h4>
            </div>
        </div>
    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>
function updateSelectedTotal() {
    const selected = document.querySelectorAll('input[name="ids"]:checked');
    let total = 0;

    selected.forEach(input => {
        const value = Number.parseFloat(input.dataset.valor || '0');

        if (!Number.isNaN(value)) {
            total += value;
        }
    });

    const countElement = document.getElementById('selected-count');
    const totalElement = document.getElementById('selected-total-value');

    if (!countElement || !totalElement) {
        return;
    }

    countElement.textContent = selected.length;
    totalElement.textContent =
            total.toLocaleString('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            });
}

document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('input[name="ids"]').forEach(input => {
        input.addEventListener('change', updateSelectedTotal);
    });

    updateSelectedTotal();
});
</script>

</body>
</html>
