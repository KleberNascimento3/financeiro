<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Cartões</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between mb-3">
        <h2>Cartões</h2>
        <a th:href="@{/cartoes/novo}" class="btn btn-primary">Novo Cartão</a>
    </div>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Fechamento</th>
                <th>Vencimento</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="cartao : ${lista}">
                <td th:text="${cartao.nome}"></td>
                <td th:text="${cartao.diaFechamento}"></td>
                <td th:text="${cartao.diaVencimento}"></td>
                <td>
                    <a th:href="@{/cartoes/editar/{id}(id=${cartao.id})}" class="btn btn-warning btn-sm">Editar</a>
                    <a th:href="@{/cartoes/excluir/{id}(id=${cartao.id})}" class="btn btn-danger btn-sm"
                       onclick="return confirm('Deseja excluir este cartão?')">Excluir</a>
                </td>
            </tr>
        </tbody>
    </table>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
