<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Cartão</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">

    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">Cartão</h3>
        </div>

        <div class="card-body">

            <form th:action="@{/cartoes/salvar}" th:object="${cartao}" method="post">

                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label">Nome do Cartão</label>
                    <input type="text" class="form-control" th:field="*{nome}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Dia de Fechamento</label>
                    <input type="number" class="form-control" th:field="*{diaFechamento}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Dia de Vencimento</label>
                    <input type="number" class="form-control" th:field="*{diaVencimento}">
                </div>

                <button type="submit" class="btn btn-success">Salvar</button>
                <a th:href="@{/cartoes}" class="btn btn-secondary">Voltar</a>

            </form>

        </div>
    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
