<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-4">

            <div class="card">

                <div class="card-header text-center">
                    <h3>Financeiro Pessoal</h3>
                </div>

                <div class="card-body">

                    <form method="post" action="/login">

                        <div class="mb-3">
                            <label>Usuário</label>
                            <input type="text"
                                   name="username"
                                   class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>Senha</label>
                            <input type="password"
                                   name="password"
                                   class="form-control">
                        </div>

                        <button class="btn btn-primary w-100">
                            Entrar
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
